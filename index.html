<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#160008">
<title>Sea Eagle Spins</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="src/sea-eagle-clean.css?v=22">
</head>
<body>
<div id="app">
  <section id="game" class="game active">
    <header class="topbar">
      <div class="level card"><b id="levelNo">1</b><div><span>LEVEL <i id="levelPct">0%</i></span><em><u id="levelFill"></u></em></div></div>
      <button class="logo" data-action="menu"><strong>SEA EAGLE</strong><b>SPINS</b><small>★★★★★</small></button>
      <div class="wallet"><div class="coins card"><span>BALANCE</span><b id="coins">75,000</b></div><button class="plus" data-action="topup">+</button></div>
    </header>
    <div class="jackpots"><div class="jackpot"><span>MINOR</span><b id="minor">15,000</b></div><div class="jackpot"><span>MAJOR</span><b id="major">75,000</b></div><div class="jackpot"><span>GRAND</span><b id="grand">250,000</b></div></div>
    <div id="stage" class="stage">LEVEL 1 · BROOKIE GATES</div>
    <main id="machine" class="machine"><div id="reels" class="reels"></div><div id="payline" class="payline"></div></main>
    <div class="stats"><div id="freeStat" class="stat card"><span>FREE SPINS</span><b id="free">0 / 0</b></div><div class="stat card"><span>TOTAL WIN</span><b id="win">0</b></div><div class="stat card"><span>MULTIPLIER</span><b id="mult">x1</b></div></div>
    <div class="controls"><div class="bet card"><span>BET</span><b id="bet">500</b><button data-action="minus">−</button><button data-action="plusBet">+</button></div><button class="spin" data-action="spin"><strong>SPIN</strong><small>HOLD<br>TURBO</small></button><button class="auto" data-action="auto">↻ AUTO</button></div>
    <nav class="bottom"><button data-page="home"><i>⌂</i><span>HOME</span></button><button data-action="payouts"><i>🏆</i><span>PAYS</span></button><button data-page="map"><i>🗺</i><span>MAP</span></button><button data-page="challenges"><i>⚡</i><span>QUESTS</span></button><button data-page="settings"><i>⚙</i><span>MORE</span></button></nav>
  </section>
  <section id="page" class="page">
    <header class="topbar"><button class="logo" data-action="play"><strong>SEA EAGLE</strong><b>SPINS</b></button><div></div><div class="wallet"><div class="coins card"><span>BALANCE</span><b id="pageCoins">75,000</b></div><button class="plus" data-action="topup">+</button></div></header>
    <main id="pageContent" class="pageContent"></main>
    <nav class="bottom"><button data-action="play"><i>🎰</i><span>PLAY</span></button><button data-page="home"><i>⌂</i><span>HOME</span></button><button data-page="map"><i>🗺</i><span>MAP</span></button><button data-page="challenges"><i>⚡</i><span>QUESTS</span></button><button data-page="settings"><i>⚙</i><span>MORE</span></button></nav>
  </section>
  <div id="commentary" class="overlay commentary"></div>
  <div id="winBox" class="overlay winBox"></div>
  <div id="resultBox" class="overlay resultBox"></div>
  <div id="freeBanner" class="overlay freeBanner"></div>
  <div id="modal" class="modal"><div id="modalCard" class="modalCard"></div></div>
</div>
<script src="src/sea-eagle-clean.js?v=22"></script>
</body>
</html>
